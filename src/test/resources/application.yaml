spring:
  ai:
    model:
      chat: none
      embedding: none
    openai:
      api-key: test-placeholder
    anthropic:
      api-key: test-placeholder
    google:
      genai:
        api-key: test-placeholder
  datasource:
    url: jdbc:h2:mem:x_ai_gateway;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  liquibase:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

management:
  tracing:
    enabled: false
