databaseChangeLog:
  - changeSet:
      id: 0012-platform-operations
      author: codex
      changes:
        - createTable:
            tableName: installation_state
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: status, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: active_release_artifact_id, type: BIGINT }
              - column: { name: bootstrap_completed, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: last_health_check_at, type: TIMESTAMP WITH TIME ZONE }
              - column: { name: metadata_json, type: TEXT }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: backup_job
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: status, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: dry_run, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: snapshot_path, type: VARCHAR(512) }
              - column: { name: summary_json, type: TEXT }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: restore_job
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: backup_job_id, type: BIGINT }
              - column: { name: status, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: dry_run, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: summary_json, type: TEXT }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: release_artifact
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: version_name, type: VARCHAR(128), constraints: { nullable: false } }
              - column: { name: artifact_ref, type: VARCHAR(512), constraints: { nullable: false } }
              - column: { name: active, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: upgrade_job
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: target_release_artifact_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: pre_backup_job_id, type: BIGINT }
              - column: { name: status, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: message, type: VARCHAR(1024) }
              - column: { name: auto_rollback_triggered, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: rollback_job
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: upgrade_job_id, type: BIGINT }
              - column: { name: release_artifact_id, type: BIGINT }
              - column: { name: backup_job_id, type: BIGINT }
              - column: { name: status, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: message, type: VARCHAR(1024) }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
