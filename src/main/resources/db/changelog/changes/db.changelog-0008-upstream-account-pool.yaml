databaseChangeLog:
  - changeSet:
      id: 0008-upstream-account-pool
      author: codex
      changes:
        - createTable:
            tableName: upstream_account_pool
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: pool_name, type: VARCHAR(128), constraints: { nullable: false } }
              - column: { name: provider_type, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: supported_models_json, type: TEXT }
              - column: { name: supported_protocols_json, type: TEXT }
              - column: { name: allowed_client_families_json, type: TEXT }
              - column: { name: is_active, type: BOOLEAN, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: description, type: VARCHAR(512) }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: upstream_account
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: pool_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: account_name, type: VARCHAR(128), constraints: { nullable: false } }
              - column: { name: provider_type, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: external_account_id, type: VARCHAR(256) }
              - column: { name: access_token_ciphertext, type: TEXT }
              - column: { name: refresh_token_ciphertext, type: TEXT }
              - column: { name: is_active, type: BOOLEAN, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: is_frozen, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: is_healthy, type: BOOLEAN, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: last_refresh_at, type: TIMESTAMP WITH TIME ZONE }
              - column: { name: last_used_at, type: TIMESTAMP WITH TIME ZONE }
              - column: { name: last_error_message, type: VARCHAR(512) }
              - column: { name: metadata_json, type: TEXT }
              - column: { name: proxy_id, type: BIGINT }
              - column: { name: tls_fingerprint_profile_id, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: distributed_key_account_pool_binding
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: distributed_key_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: pool_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: provider_type, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: priority, type: INT, defaultValueNumeric: 100, constraints: { nullable: false } }
              - column: { name: is_active, type: BOOLEAN, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: oauth_authorization_session
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: session_key, type: VARCHAR(96), constraints: { nullable: false } }
              - column: { name: provider_type, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: pool_id, type: BIGINT }
              - column: { name: status, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: authorization_url, type: TEXT }
              - column: { name: code_verifier, type: VARCHAR(256) }
              - column: { name: redirect_path, type: VARCHAR(256) }
              - column: { name: metadata_json, type: TEXT }
              - column: { name: expires_at, type: TIMESTAMP WITH TIME ZONE }
              - column: { name: created_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP WITH TIME ZONE, defaultValueComputed: CURRENT_TIMESTAMP, constraints: { nullable: false } }
        - addUniqueConstraint:
            tableName: oauth_authorization_session
            columnNames: session_key
            constraintName: uk_oauth_authorization_session_session_key
