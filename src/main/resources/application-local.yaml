spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/x_ai_gateway}
    username: ${DB_USERNAME:x_ai_gateway}
    password: ${DB_PASSWORD:x_ai_gateway}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoint:
    health:
      show-details: always
