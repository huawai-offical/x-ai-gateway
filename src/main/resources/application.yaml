spring:
  application:
    name: x-ai-gateway
  ai:
    model:
      chat: none
      embedding: none
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:disabled-placeholder}
    anthropic:
      api-key: ${SPRING_AI_ANTHROPIC_API_KEY:disabled-placeholder}
    google:
      genai:
        api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY:disabled-placeholder}
  profiles:
    default: local
  main:
    web-application-type: reactive
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/x_ai_gateway}
    username: ${DB_USERNAME:x_ai_gateway}
    password: ${DB_PASSWORD:x_ai_gateway}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5s
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    contexts: ${LIQUIBASE_CONTEXTS:local}
    default-schema: public

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,configprops
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    enabled: true

gateway:
  routing:
    interop-plan-enabled: true
    route-decision-logging-enabled: true
  cache:
    enabled: true
    sticky-by-distributed-key: true
    prefix-affinity-enabled: true
    fingerprint-affinity-enabled: true
    affinity-ttl: 30m
    fingerprint-max-prefix-tokens: 1024
    key-prefix: xag
  security:
    distributed-key-hash-only: true
    encrypt-upstream-api-key: true
    encryption-key: ${GATEWAY_ENCRYPTION_KEY:change-me-local-only}
  storage:
    file-root: ${GATEWAY_FILE_ROOT:.data/files}
